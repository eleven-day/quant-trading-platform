name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml', '**/requirements-test.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install -r tests/requirements-test.txt
    
    - name: Set up test environment
      run: |
        cd server
        python tests/run_tests.py setup
    
    - name: Run linting
      run: |
        cd server
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run type checking
      run: |
        cd server
        mypy app/ --ignore-missing-imports
    
    - name: Run security scan
      run: |
        cd server
        bandit -r app/ -f json -o bandit-report.json || true
        safety check --json --output safety-report.json || true
    
    - name: Run unit tests
      run: |
        cd server
        python tests/run_tests.py unit
    
    - name: Run API tests
      run: |
        cd server
        python tests/run_tests.py api
    
    - name: Run integration tests
      run: |
        cd server
        python tests/run_tests.py integration
    
    - name: Run tests with coverage
      run: |
        cd server
        python tests/run_tests.py coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./server/coverage.xml
        fail_ci_if_error: false
    
    - name: Generate test report
      if: always()
      run: |
        cd server
        python tests/run_tests.py report
    
    - name: Upload test report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-report-${{ matrix.python-version }}
        path: server/test_report.html
    
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports-${{ matrix.python-version }}
        path: |
          server/bandit-report.json
          server/safety-report.json

  performance:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install -r tests/requirements-test.txt
    
    - name: Run performance tests
      run: |
        cd server
        python tests/run_tests.py performance
    
    - name: Run stress tests
      run: |
        cd server
        python tests/run_tests.py stress

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: |
        docker build -t quant-platform-server:test ./server
    
    - name: Test Docker image
      run: |
        docker run --rm -d --name test-container -p 8000:8000 quant-platform-server:test
        sleep 10
        curl -f http://localhost:8000/health || exit 1
        docker stop test-container 